# OpenMasjidAPPS registry
# ---------------------------------------------------------------------------
# This is the ONLY hand-edited source of truth for the catalog. Each app lives
# in its OWN public repository; this file just lists them. The build script
# (scripts/build-catalog.mjs) fetches each repo's manifest.yaml +
# docker-compose.yml (+ icon/screenshots) and assembles catalog.json — the file
# OpenMasjidOS actually fetches.
#
# To list an app, open a PR adding an entry below. Each entry:
#
#   - id:   <app-id>                 # kebab-case, must equal the app's manifest id
#     repo: <owner>/<repo>           # the app's own GitHub repository
#     ref:  v1.0.0                   # a git TAG (recommended) or branch to pin to
#     path: subdir                   # OPTIONAL — if manifest.yaml isn't at the repo root
#
# Requirements an app repo must meet are in CLAUDE.md and docs/BUILDING_AN_APP.md.
# Complete, working reference apps live under examples/ in this repo — copy one
# into a new repo to start.
# ---------------------------------------------------------------------------

apps:
  - id: display
    repo: hasan-ismail/OpenMasjidDisplay
    ref: v0.20.5
  # Example (uncomment and adapt once the app repo exists):
  # - id: prayer-times-display
  #   repo: hasan-ismail/openmasjid-prayer-times-display
  #   ref: v1.0.0
  # - id: announcements-board
  #   repo: hasan-ismail/openmasjid-announcements-board
  #   ref: v1.0.0

# Coming-soon teasers — apps that aren't released yet (no repo/image). They show
# in the App Store with a "Coming soon" badge and can't be installed. Metadata
# only here; when one ships, give it a repo + tag and move it up into `apps:`.
coming_soon:
  - id: kiosk
    name: OpenMasjid Kiosk
    tagline: An Android-tablet donation kiosk — take in-person card donations with a Stripe M2 card reader.
    category: donations
  - id: donations
    name: OpenMasjid Donations
    tagline: An online donation page — supporters give by entering their card details; collect and track giving.
    category: donations
  - id: student-manager
    name: OpenMasjid Student Manager
    tagline: Run your madrasah — students, classes, attendance and progress.
    category: admin
