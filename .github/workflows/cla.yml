#
# Contributor License Agreement enforcement.
#
# On every pull request, the CLA Assistant bot checks whether each contributor
# has signed CLA.md. If not, it comments asking them to sign by replying with
# the exact sentence below; signatures are recorded in signatures/version1/cla.json
# on the default branch, so each person signs only once.
#
# One-time setup (repo admin): create a repository secret named PERSONAL_ACCESS_TOKEN
# — a token with `contents: write` + `pull-requests: write` on this repo — so the
# bot can commit signatures and update the PR. (The built-in GITHUB_TOKEN works for
# many cases, but the bot is most reliable with a PAT.)
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          github.event.comment.body == 'recheck'
          || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional but recommended — see the header note above.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/OpenMasjid-Solutions/OpenMasjidAPPS/blob/main/CLA.md'
          # Branch where the signatures file is stored/committed (the default branch).
          branch: 'main'
          # The custom sentence a contributor posts to sign:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you! 🕌'
          # Accounts that never need to sign (the maintainers + bots):
          allowlist: hasan-ismail,dependabot[bot],github-actions[bot]
