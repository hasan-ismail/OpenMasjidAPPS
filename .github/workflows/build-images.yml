name: Build app images

# Builds the Docker image for every app that ships a Dockerfile and publishes it
# to GitHub Container Registry (GHCR), multi-arch (amd64 + arm64) so it runs on
# both mini-PCs/VPSes and Raspberry Pi. The app's docker-compose.yml references
# the published, pinned tag — so these images must exist for an install to work.
#
# Images are named: ghcr.io/<owner>/openmasjid-<app-id>:<version> (+ :latest)
#
# One-time setup after the first successful run: open each new package under
# https://github.com/<owner>?tab=packages and change its visibility to "Public"
# so masjid hosts can pull it without authentication.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**/Dockerfile'
      - 'apps/**/src/**'
      - 'apps/**/docker-entrypoint.d/**'
      - 'apps/**/manifest.yaml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_apps: ${{ steps.find.outputs.has_apps }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        name: Discover apps with a Dockerfile
        run: |
          items=""
          for d in apps/*/; do
            id=$(basename "$d")
            [ -f "${d}Dockerfile" ] || continue
            ver=$(grep -E '^version:' "${d}manifest.yaml" | head -1 \
                  | sed -E 's/^version:[[:space:]]*//' | tr -d "\"' \r")
            [ -n "$ver" ] || ver="latest"
            items="$items{\"id\":\"$id\",\"version\":\"$ver\"}"$'\n'
          done
          matrix=$(printf '%s' "$items" | grep -v '^$' | jq -sc '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ "$matrix" = '{"include":[]}' ]; then
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered: $matrix"

  build:
    needs: discover
    if: needs.discover.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.id }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.id }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/openmasjid-${{ matrix.id }}:${{ matrix.version }}
            ghcr.io/${{ steps.owner.outputs.name }}/openmasjid-${{ matrix.id }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
