name: Build catalog

# Regenerate catalog.json (the file OpenMasjidOS fetches) whenever apps or the
# build tooling change, and commit it back so the published catalog is in sync.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/build-catalog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run build

      - name: Commit regenerated catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --staged --quiet; then
            echo "catalog.json already up to date."
          else
            git commit -m "chore: rebuild catalog.json"
            git push
          fi
